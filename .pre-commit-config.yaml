repos:
  - repo: local
    hooks:
      - id: black
        name: black
        entry: .venv/bin/python -m black
        language: system
        files: ^(vei|tests)/.*\.py$
      - id: ruff
        name: ruff
        entry: .venv/bin/python -m ruff check --fix
        language: system
        files: ^(vei|tests)/.*\.py$
      - id: mypy-targets
        name: mypy
        entry: .venv/bin/python scripts/run_mypy_targets.py
        language: system
        pass_filenames: false
