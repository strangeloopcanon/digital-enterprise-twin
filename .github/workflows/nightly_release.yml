name: nightly-release

on:
  schedule:
    - cron: "15 8 * * *"
  workflow_dispatch:

jobs:
  nightly:
    runs-on: ubuntu-latest
    env:
      AGENT_MODE: baseline
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Setup
        run: make setup-full

      - name: Validate
        run: VEI_LLM_LIVE_BYPASS=1 make all

      - name: Build Nightly Release Bundle
        run: |
          . .venv/bin/activate
          vei release nightly \
            --release-root _vei_out/releases \
            --workspace-root _vei_out/nightly \
            --environments 5 \
            --scenarios-per-environment 5 \
            --rollout-episodes 2 \
            --benchmark-scenario multi_channel

      - name: Upload Nightly Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vei-nightly-release
          path: |
            _vei_out/releases/**
            _vei_out/nightly/**
